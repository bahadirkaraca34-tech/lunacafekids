<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0D0D1A">
<title>🌙 Luna Cafe Kids — TV</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
<script src="/socket.io/socket.io.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#0D0D1A;color:#F0F0F0;font-family:'Poppins',sans-serif;}

/* ── GİRİŞ ── */
.login-screen{
  position:fixed;inset:0;background:#0D0D1A;display:flex;align-items:center;justify-content:center;z-index:999;
  background-image:radial-gradient(ellipse at 30% 30%,rgba(155,93,229,.2) 0%,transparent 60%),
    radial-gradient(ellipse at 70% 70%,rgba(6,214,160,.15) 0%,transparent 60%);
}
.login-screen.hidden{display:none;}
.login-box{background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.1);border-radius:24px;padding:40px 32px;width:340px;text-align:center;backdrop-filter:blur(20px);}
.login-logo{font-family:'Fredoka One',cursive;font-size:28px;color:#FFD166;margin-bottom:4px;}
.login-sub{font-size:13px;color:rgba(240,240,240,.5);font-weight:600;margin-bottom:24px;}
.login-field{width:100%;padding:13px 16px;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.1);border-radius:12px;font-family:'Poppins',sans-serif;font-size:15px;font-weight:600;color:#F0F0F0;outline:none;margin-bottom:10px;}
.login-field:focus{border-color:#FFD166;}
.login-field::placeholder{color:rgba(240,240,240,.4);}
.login-btn{width:100%;padding:13px;background:linear-gradient(135deg,#FF5C5C,#FF8C42);border:none;border-radius:12px;color:white;font-family:'Poppins',sans-serif;font-size:16px;font-weight:800;cursor:pointer;margin-top:4px;}
.login-error{color:#FF5C5C;font-size:13px;font-weight:600;margin-top:10px;min-height:18px;text-align:center;}

.pin-dot{
  width:14px;height:14px;border-radius:50%;
  border:2px solid rgba(255,255,255,.3);
  background:transparent;transition:all .2s;
}
.pin-dot.filled{background:#FFD166;border-color:#FFD166;}
.pin-dot.error{background:#FF5C5C;border-color:#FF5C5C;}

.pin-btn{
  padding:18px;background:rgba(255,255,255,.08);
  border:1.5px solid rgba(255,255,255,.1);border-radius:14px;
  color:#F0F0F0;font-family:'Fredoka One',cursive;font-size:24px;
  cursor:pointer;transition:all .15s;user-select:none;
}
.pin-btn:active{background:rgba(255,209,102,.2);border-color:#FFD166;transform:scale(.95);}
.pin-clear{background:rgba(255,92,92,.1);border-color:rgba(255,92,92,.3);color:#FF5C5C;}
.pin-del{background:rgba(255,255,255,.05);font-size:20px;}

/* ── LAYOUT ── */
.app{display:flex;flex-direction:column;height:100vh;width:100vw;}

/* ── HEADER ── */
.hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 24px;
  background:rgba(13,13,26,.95);
  border-bottom:2px solid rgba(255,209,102,.2);
  flex-shrink:0;
}
.hdr-logo{display:flex;align-items:center;gap:8px;}
.hdr-logo-text{font-family:'Fredoka One',cursive;font-size:20px;color:#FFD166;}
.hdr-logo-sub{font-size:11px;color:rgba(240,240,240,.4);font-weight:600;margin-top:1px;}
.hdr-clock{font-family:'Fredoka One',cursive;font-size:32px;color:#FFD166;text-align:center;line-height:1;}
.hdr-date{font-size:11px;color:rgba(240,240,240,.5);font-weight:600;text-align:center;margin-top:2px;}
.hdr-right{text-align:right;}
.hdr-count{font-family:'Fredoka One',cursive;font-size:28px;color:#06D6A0;line-height:1;}
.hdr-count-lbl{font-size:11px;color:rgba(240,240,240,.4);font-weight:600;margin-top:2px;}

/* ── GRID ── */
.grid-wrap{flex:1;overflow-y:auto;padding:10px 12px;}
.timer-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  align-content:start;
}
@media(max-width:1024px){.timer-grid{grid-template-columns:repeat(3,1fr);}}
@media(max-width:700px){
  .timer-grid{grid-template-columns:1fr;gap:8px;}
  .hdr{padding:8px 14px;}
  .hdr-logo-text{font-size:15px;}
  .hdr-clock{font-size:22px;}
  .hdr-count{font-size:20px;}
  .tc{padding:12px 14px 10px;border-radius:12px;}
  .tc-name{font-size:16px;margin-bottom:6px;}
  .tc-times-row{padding:6px 0;}
  .tc-time-val{font-size:18px;}
  .tc-time{font-size:30px;}
  .tc-time-lbl{font-size:10px;}
  .tc-badge{font-size:10px;padding:3px 10px;}
}

/* ── CARD ── */
.tc{
  background:rgba(255,255,255,.05);
  border:2px solid rgba(255,255,255,.08);
  border-radius:16px;
  padding:16px 14px 14px;
  display:flex;flex-direction:column;align-items:center;
  position:relative;overflow:hidden;
  transition:border-color .3s,background .3s;
}
.tc::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;border-radius:16px 16px 0 0;}

.tc.running{border-color:rgba(6,214,160,.35);}
.tc.running::before{background:linear-gradient(90deg,#06D6A0,#04A87B);}
.tc.warning{border-color:rgba(255,209,102,.5);animation:pw 1.5s infinite;}
.tc.warning::before{background:linear-gradient(90deg,#FFD166,#FF8C42);animation:blink .8s infinite;}
.tc.expired{border-color:rgba(255,92,92,.6);background:rgba(255,92,92,.08);animation:pr 1.5s infinite;}
.tc.expired::before{background:linear-gradient(90deg,#FF5C5C,#FF3B3B);}

@keyframes pw{0%,100%{box-shadow:none}50%{box-shadow:0 0 16px rgba(255,209,102,.25)}}
@keyframes pr{0%,100%{box-shadow:none}50%{box-shadow:0 0 20px rgba(255,92,92,.3)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}

/* İsim */
.tc-name{
  font-family:'Fredoka One',cursive;font-size:20px;color:#F0F0F0;
  text-align:center;line-height:1.2;margin-bottom:10px;
  width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
/* Saat satırı */
.tc-times-row{
  display:flex;align-items:center;justify-content:space-between;
  width:100%;gap:4px;margin-bottom:10px;
  border-top:1px solid rgba(255,255,255,.08);
  border-bottom:1px solid rgba(255,255,255,.08);
  padding:8px 0;
}
.tc-time-block{display:flex;flex-direction:column;align-items:center;flex:0 0 auto;}
.tc-dur-block{display:flex;flex-direction:column;align-items:center;flex:1;}
.tc-time-lbl{
  font-size:11px;font-weight:700;color:rgba(240,240,240,.4);
  text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;
}
.tc-time-val{font-family:'Fredoka One',cursive;font-size:24px;line-height:1;}
.tc-entry .tc-time-val{color:#06D6A0;}
.tc-exit .tc-time-val{color:rgba(240,240,240,.7);}
.tc-exit-red{color:#FF5C5C !important;}
/* Geri sayım */
.tc-time{font-family:'Fredoka One',cursive;font-size:40px;letter-spacing:1px;line-height:1;text-align:center;}
.tc-time.g{color:#06D6A0;}
.tc-time.y{color:#FFD166;}
.tc-time.r{color:#FF5C5C;}
/* Rozet */
.tc-badge{padding:4px 14px;border-radius:20px;font-size:12px;font-weight:700;}
.tc-badge.bg{background:rgba(6,214,160,.15);color:#06D6A0;}
.tc-badge.by{background:rgba(255,209,102,.15);color:#FFD166;}
.tc-badge.br{background:rgba(255,92,92,.15);color:#FF5C5C;}

/* ── EMPTY ── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:rgba(240,240,240,.3);}
.empty-icon{font-size:64px;margin-bottom:12px;}
.empty-text{font-family:'Fredoka One',cursive;font-size:24px;}

/* ── CONN ── */
.conn{position:fixed;bottom:12px;right:12px;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:700;display:flex;align-items:center;gap:5px;background:rgba(6,214,160,.15);border:1px solid rgba(6,214,160,.3);color:#06D6A0;z-index:100;}
.conn.off{background:rgba(255,92,92,.15);border-color:rgba(255,92,92,.3);color:#FF5C5C;}
.conn-dot{width:6px;height:6px;border-radius:50%;background:currentColor;animation:blink 1.2s infinite;}

/* ── FOOTER ── */
.ftr{text-align:center;padding:4px;font-size:10px;color:rgba(240,240,240,.15);font-weight:600;flex-shrink:0;}
</style>
</head>
<body>

<!-- GİRİŞ -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-logo">📺 Luna Cafe Kids</div>
    <div class="login-sub">TV Ekranı — PIN Girin</div>
    <div id="pinDots" style="display:flex;justify-content:center;gap:12px;margin:20px 0;">
      <div class="pin-dot" id="dot0"></div>
      <div class="pin-dot" id="dot1"></div>
      <div class="pin-dot" id="dot2"></div>
      <div class="pin-dot" id="dot3"></div>
      <div class="pin-dot" id="dot4"></div>
      <div class="pin-dot" id="dot5"></div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:8px;">
      <button class="pin-btn" onclick="pinPress(1)">1</button>
      <button class="pin-btn" onclick="pinPress(2)">2</button>
      <button class="pin-btn" onclick="pinPress(3)">3</button>
      <button class="pin-btn" onclick="pinPress(4)">4</button>
      <button class="pin-btn" onclick="pinPress(5)">5</button>
      <button class="pin-btn" onclick="pinPress(6)">6</button>
      <button class="pin-btn" onclick="pinPress(7)">7</button>
      <button class="pin-btn" onclick="pinPress(8)">8</button>
      <button class="pin-btn" onclick="pinPress(9)">9</button>
      <button class="pin-btn pin-clear" onclick="pinClear()">✕</button>
      <button class="pin-btn" onclick="pinPress(0)">0</button>
      <button class="pin-btn pin-del" onclick="pinDel()">⌫</button>
    </div>
    <div class="login-error" id="tvErr"></div>
    <div style="margin-top:16px;font-size:11px;color:rgba(240,240,240,.3);">© 2025 Karaca Yazılım</div>
  </div>
</div>

<!-- ANA UYGULAMA -->
<div class="app">
  <!-- HEADER -->
  <div class="hdr">
    <div class="hdr-logo">
      <span style="font-size:22px;">🌙</span>
      <div>
        <div class="hdr-logo-text">Luna Cafe Kids</div>
        <div class="hdr-logo-sub">Oyun Alanı</div>
      </div>
    </div>
    <div>
      <div class="hdr-clock" id="clock">--:--</div>
      <div class="hdr-date" id="dateLbl"></div>
    </div>
    <div class="hdr-right">
      <div class="hdr-count" id="countNum">0</div>
      <div class="hdr-count-lbl">aktif çocuk</div>
    </div>
  </div>

  <!-- GRID -->
  <div class="grid-wrap">
    <div class="timer-grid" id="grid">
      <div class="empty" style="grid-column:1/-1">
        <div class="empty-icon">🎪</div>
        <div class="empty-text">Oyun alanı boş</div>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <div class="ftr">© 2025 Karaca Yazılım · Luna Cafe Kids</div>
</div>

<!-- BAĞLANTI -->
<div class="conn" id="conn"><div class="conn-dot"></div><span id="connTxt">Bağlanıyor...</span></div>

<script>
const TV_PIN = '123321';
let pinEntry = '';

function pinPress(n) {
  if (pinEntry.length >= 6) return;
  pinEntry += n;
  updatePinDots();
  if (pinEntry.length === 6) {
    setTimeout(checkPin, 150);
  }
}

function pinDel() {
  pinEntry = pinEntry.slice(0, -1);
  updatePinDots();
}

function pinClear() {
  pinEntry = '';
  updatePinDots();
  document.getElementById('tvErr').textContent = '';
}

function updatePinDots() {
  for (let i = 0; i < 6; i++) {
    const dot = document.getElementById('dot' + i);
    dot.className = 'pin-dot' + (i < pinEntry.length ? ' filled' : '');
  }
}

function checkPin() {
  if (pinEntry === TV_PIN) {
    sessionStorage.setItem('tv_auth', '1');
    document.getElementById('loginScreen').classList.add('hidden');
    initTV();
  } else {
    for (let i = 0; i < 6; i++) {
      document.getElementById('dot' + i).className = 'pin-dot error';
    }
    document.getElementById('tvErr').textContent = '❌ Hatalı PIN';
    setTimeout(() => {
      pinEntry = '';
      updatePinDots();
      document.getElementById('tvErr').textContent = '';
    }, 800);
  }
}

// Klavye / kumanda desteği
document.addEventListener('keydown', function(e) {
  if (!document.getElementById('loginScreen').classList.contains('hidden')) {
    // Sayı tuşları (0-9)
    if (e.key >= '0' && e.key <= '9') { pinPress(parseInt(e.key)); return; }
    // Numpad
    if (e.code && e.code.startsWith('Numpad') && e.key >= '0' && e.key <= '9') { pinPress(parseInt(e.key)); return; }
    // Sil
    if (e.key === 'Backspace' || e.key === 'Delete') { pinDel(); return; }
    // Escape ile temizle
    if (e.key === 'Escape') { pinClear(); return; }
  }
});

let children=[], socket, reconnTimer=null;

function initTV(){
  socket=io({reconnection:true,reconnectionDelay:2000,reconnectionAttempts:Infinity,timeout:10000});
  const conn=document.getElementById('conn');

  socket.on('connect',()=>{
    conn.className='conn';
    document.getElementById('connTxt').textContent='Canlı';
    if(reconnTimer){clearTimeout(reconnTimer);reconnTimer=null;}
    loadChildren();
  });

  socket.on('disconnect',()=>{
    conn.className='conn off';
    document.getElementById('connTxt').textContent='Yeniden Bağlanıyor...';
    reconnTimer=setTimeout(()=>location.reload(),30000);
  });

  socket.on('children:update',()=>loadChildren());

  socket.on('timer:tick',(ticks)=>{
    // Artık remaining'e gerek yok, client kendi saatiyle hesaplıyor
    updateDisplays();
    updateCount();
  });

  socket.on('timer:alert',(a)=>{if(a.type==='expired')playBell();});

  // Yedek yenileme
  setInterval(loadChildren,10000);
  // Sunucuyu uyanık tut
  setInterval(()=>fetch('/api/children').catch(()=>{}),25000);
}

async function loadChildren(){
  try{
    const res=await fetch('/api/children');
    children=await res.json();
    renderGrid();
    updateCount();
  }catch(e){}
}

function renderGrid(){
  const active=children.filter(c=>c.status!=='paid');
  const grid=document.getElementById('grid');
  if(!active.length){
    grid.innerHTML=`<div class="empty" style="grid-column:1/-1"><div class="empty-icon">🎪</div><div class="empty-text">Oyun alanı boş</div></div>`;
    return;
  }
  grid.innerHTML=active.map(c=>card(c)).join('');
}

function getRemaining(c){
  const exit=new Date(new Date(c.startedAt).getTime()+c.totalSec*1000);
  return Math.max(0,Math.floor((exit-new Date())/1000));
}

function getRealStatus(c){
  const r=getRemaining(c);
  if(r<=0)return'expired';
  if(r<=300)return'warning';
  return'running';
}

function fmt(c){
  const r=getRemaining(c);
  if(r<=0)return'BITTI';
  return String(Math.floor(r/60)).padStart(2,'0')+':'+String(r%60).padStart(2,'0');
}

function card(c){
  const id=c._id?.toString();
  const status=getRealStatus(c);
  const tc=status==='expired'?'r':status==='warning'?'y':'g';
  const badge=status==='expired'?'br':status==='warning'?'by':'bg';
  const badgeTxt=status==='expired'?'Sure Doldu':status==='warning'?'Son 5 Dakika':'Oynuyor';
  const girisSaat=new Date(c.startedAt).toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'});
  const cikisSaat=new Date(new Date(c.startedAt).getTime()+c.totalSec*1000).toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'});
  return`<div class="tc ${status}" id="tc-${id}">
    <div class="tc-name">${c.fullName}</div>
    <div class="tc-times-row">
      <div class="tc-time-block tc-entry">
        <div class="tc-time-lbl">Giris</div>
        <div class="tc-time-val">${girisSaat}</div>
      </div>
      <div class="tc-dur-block">
        <div class="tc-time-lbl">${c.duration} dk</div>
        <div class="tc-time ${tc}" id="tt-${id}">${fmt(c)}</div>
      </div>
      <div class="tc-time-block tc-exit">
        <div class="tc-time-lbl">Cikis</div>
        <div class="tc-time-val ${status==='expired'?'tc-exit-red':''}">${cikisSaat}</div>
      </div>
    </div>
    <div class="tc-badge ${badge}">${badgeTxt}</div>
  </div>`;
}

function updateDisplays(){
  children.forEach(c=>{
    if(c.status==='paid')return;
    const id=c._id?.toString();
    const el=document.getElementById('tt-'+id);
    const cd=document.getElementById('tc-'+id);
    if(!el)return;
    const status=getRealStatus(c);
    el.textContent=fmt(c);
    el.className='tc-time '+(status==='expired'?'r':status==='warning'?'y':'g');
    if(cd)cd.className='tc '+status;
    // Expire olunca zil çal
    if(status==='expired' && !c._alerted){
      c._alerted=true;
      playBell();
    }
  });
}

// Her saniye gerçek saate göre güncelle
setInterval(updateDisplays,1000);

function updateCount(){
  document.getElementById('countNum').textContent=children.filter(c=>c.status!=='paid').length;
}

function updateClock(){
  const n=new Date();
  document.getElementById('clock').textContent=n.toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('dateLbl').textContent=n.toLocaleDateString('tr-TR',{day:'numeric',month:'long',weekday:'long'});
}
setInterval(updateClock,1000);
updateClock();

function playBell(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [[523,0],[659,.18],[784,.36],[1047,.54],[784,.72],[523,.9]].forEach(([f,t])=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);o.frequency.value=f;o.type='triangle';
      g.gain.setValueAtTime(.3,ctx.currentTime+t);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+t+.5);
      o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+.6);
    });
  }catch(e){}
}

// INIT
if(sessionStorage.getItem('tv_auth')==='1'){
  document.getElementById('loginScreen').classList.add('hidden');
  initTV();
}
</script>
</body>
</html>
